<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ウォッチリスト</title>
<link rel="apple-touch-icon" href="data:,">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#c9d1d9;
  --muted:#8b949e;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--gold:#FFD700;--orange:#FFA500}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans",sans-serif;
  background:var(--bg);color:var(--text);font-size:13px;-webkit-text-size-adjust:100%;
  display:flex;flex-direction:column}

/* --- Header --- */
header{background:var(--bg2);padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
header h1{font-size:15px;color:var(--blue);display:inline}
.meta{font-size:10px;color:var(--muted);margin-left:8px}
.controls{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center}
.controls input[type=text]{background:var(--bg);border:1px solid var(--border);color:var(--text);
  padding:5px 8px;border-radius:6px;font-size:14px;flex:1;min-width:100px}
.controls label{font-size:11px;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:2px}
.controls input[type=checkbox]{accent-color:var(--blue);width:16px;height:16px}

/* --- Tabs --- */
.tabs{display:flex;gap:0;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;
  white-space:nowrap;user-select:none;transition:color .15s;-webkit-tap-highlight-color:transparent}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* --- Sort bar (mobile) --- */
.sort-bar{display:none}

/* --- Count --- */
.count{font-size:10px;color:var(--muted);padding:4px 12px;flex-shrink:0}

/* --- Scroll area --- */
.scroll-area{flex:1;overflow:auto;-webkit-overflow-scrolling:touch}

/* ============================
   Desktop: Table layout
   ============================ */
.desktop-table{display:block}
.mobile-cards{display:none}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:10}
th{background:var(--bg3);color:var(--muted);font-weight:600;font-size:10px;padding:6px 7px;
  text-align:left;cursor:pointer;white-space:nowrap;border-bottom:2px solid var(--border);user-select:none}
th:hover{color:var(--blue)}
th .arrow{font-size:8px;margin-left:1px}
td{padding:5px 7px;border-bottom:1px solid rgba(48,54,61,.5);white-space:nowrap;font-size:12px}
tr:hover{background:var(--bg2)}
tr.tier1 td:first-child{border-left:3px solid var(--gold);padding-left:4px}
.code-link{color:var(--blue);text-decoration:none;font-weight:600}
.up{color:var(--green)}.down{color:var(--red)}
.badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700}
.badge-star{background:var(--gold);color:#000}
.badge-double{background:var(--orange);color:#000}
.badge-single{background:#FFFFCC;color:#333}
.r{text-align:right}
.memo-cell{white-space:normal;max-width:40vw;min-width:200px;font-size:11px;line-height:1.4;color:var(--muted);
  max-height:3.2em;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.biz-cell{white-space:normal;max-width:30vw;font-size:11px;line-height:1.4;color:var(--muted)}
.t1-tag{background:var(--gold);color:#000;font-size:8px;padding:0 3px;border-radius:2px;
  margin-left:3px;font-weight:700;vertical-align:middle}
.new-tag{background:var(--blue);color:#fff;font-size:8px;padding:0 3px;border-radius:2px;
  margin-left:3px;font-weight:700;vertical-align:middle}

/* ============================
   Mobile: Card layout (<= 768px)
   ============================ */
@media(max-width:768px){
  .desktop-table{display:none}
  .mobile-cards{display:block;padding:0 8px 8px}
  .sort-bar{display:flex;gap:6px;padding:6px 12px;flex-shrink:0;overflow-x:auto;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--bg)}
  .sort-bar::-webkit-scrollbar{display:none}
  .sort-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);
    padding:4px 8px;border-radius:12px;font-size:10px;white-space:nowrap;cursor:pointer;
    -webkit-tap-highlight-color:transparent}
  .sort-btn.active{color:var(--blue);border-color:var(--blue)}

  .card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;
    margin-top:6px;padding:10px 12px;-webkit-tap-highlight-color:transparent}
  .card.tier1{border-left:3px solid var(--gold)}
  .card-head{display:flex;align-items:center;gap:6px;margin-bottom:4px}
  .card-code{color:var(--blue);font-weight:700;font-size:13px;text-decoration:none}
  .card-name{color:var(--text);font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-badge{flex-shrink:0}
  .card-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-top:2px}
  .card-price{font-size:16px;font-weight:700;color:var(--text)}
  .card-change{font-size:13px;font-weight:600}
  .card-sub{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .card-tag{font-size:10px;color:var(--muted);background:var(--bg3);padding:2px 6px;border-radius:4px}
  .card-tag .val{color:var(--text)}
  .card-memo{font-size:11px;color:var(--muted);line-height:1.4;margin-top:6px;
    display:none;border-top:1px solid var(--border);padding-top:6px}
  .card-memo.open{display:block}
  .card-detail{font-size:11px;color:var(--muted);line-height:1.5;margin-top:4px}
  .card-detail-grid{display:grid;grid-template-columns:auto 1fr;gap:1px 10px;margin-top:4px}
  .card-detail-grid .lbl{color:var(--muted);font-size:10px}
  .card-detail-grid .val{color:var(--text);font-size:12px;text-align:right}
}
</style>
</head>

const JO={"☆":0,"◎":1,"○":2,"":3};
const isMobile=()=>window.innerWidth<=768;

// --- Tab column definitions ---
const TABS={
  price:[
    ["code","コード","","code"],["name","銘柄名","","text"],
    ["price","株価","r","price"],["change_pct","前日比%","r","chg"],
    ["judge","判定","","badge"],["memo","メモ","","memo"]
  ],
  earnings:[
    ["code","コード","","code"],["name","銘柄名","","text"],
    ["op_now","営利(今)","r","mil"],["op_prev","営利(前)","r","mil"],
    ["op_yoy","営利増減","r","chg"],["op_margin","営利率","r","pct"],
    ["sales_now","売上(今)","r","mil"],["sales_prev","売上(前)","r","mil"],
    ["sales_yoy","売上増減","r","chg"],
    ["earnings_type","決算","","text"],["consecutive","増益","r","int"]
  ],
  value:[
    ["code","コード","","code"],["name","銘柄名","","text"],

    ["ca0","流動資産(直)","r","mil"],["ca1","流動資産(1)","r","mil"],["ca2","流動資産(2)","r","mil"],
    ["inv0","有証(直)","r","mil"],["inv1","有証(1)","r","mil"],["inv2","有証(2)","r","mil"],
    ["debt0","負債(直)","r","mil"],["debt1","負債(1)","r","mil"],["debt2","負債(2)","r","mil"]
  ],
  info:[]
};

// Sort options per tab for mobile sort bar
const SORT_OPTS={
  price:[["judge","判定"],["price","株価"],["change_pct","前日比%"],["code","コード"],["name","銘柄名"]],
  earnings:[["judge","判定"],["op_yoy","営利増減"],["op_margin","営利率"],["sales_yoy","売上増減"],["consecutive","増益"],["code","コード"]],
  value:[["judge","判定"],["market_cap","時価総額"],["per","PER"],["cnper","CNPER"],["nc_ratio","NC比率"],["code","コード"]],
  nc:[["judge","判定"],["nc0","NC(直近)"],["nc_ratio","NC比率"],["code","コード"]]
};

let curTab="price",sortKey="judge",sortAsc=true;

// --- Formatters ---
function F(v,type){
  if(v===null||v===undefined||v==="") return "-";
  switch(type){
    case"price":return Number(v).toLocaleString();
    case"chg":{const n=Number(v);const s=(n>=0?"+":"")+n.toFixed(1)+"%";
      return'<span class="'+(n>=0?"up":"down")+'">'+s+"</span>"}
    case"oku":{const n=Number(v);
      if(Math.abs(n)>=1000000)return(n/1000000).toFixed(1)+"兆";return(n/100).toFixed(0)+"億"}
    case"mil":{const n=Number(v);
      if(Math.abs(n)>=1000000)return(n/1000000).toFixed(1)+"兆";
      if(Math.abs(n)>=100)return(n/100).toFixed(0)+"億";return Math.round(n)+"百万"}
    case"shares":return(Number(v)/10000).toFixed(0)+"万株";
    case"f1":return Number(v).toFixed(1);
    case"pct":{const n=Number(v);const s=(n>=0?"+":"")+n.toFixed(1)+"%";
      return'<span class="'+(n>=0?"up":"down")+'">'+s+"</span>"}
    case"int":return Math.round(Number(v)).toString();
    case"badge":{
      if(v==="☆")return'<span class="badge badge-star">☆</span>';
      if(v==="◎")return'<span class="badge badge-double">◎</span>';
      if(v==="○")return'<span class="badge badge-single">○</span>';return""}
    case"code":return v;
    case"memo":return'<div class="memo-cell">'+esc(v)+"</div>";
    case"biz":return'<div class="biz-cell">'+esc(v)+"</div>";
    default:return String(v)}
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// --- Filter & Sort ---
function getFiltered(){
  const q=document.getElementById("search").value.toLowerCase();
  const t1=document.getElementById("tier1Only").checked;
  const jo=document.getElementById("judgeOnly").checked;
  let items=DATA.filter(d=>{
    if(t1&&!d.is_tier1)return false;
    if(jo&&!d.judge)return false;
    if(q){const s=(d.code+d.name+(d.memo||"")+(d.business||"")).toLowerCase();
      if(!s.includes(q))return false}
    return true});
  items.sort((a,b)=>{
    let va=a[sortKey],vb=b[sortKey];
    if(sortKey==="judge"){va=JO[va??""]??3;vb=JO[vb??""]??3}
    if(va===null||va===undefined||va==="")va=sortAsc?Infinity:-Infinity;
    if(vb===null||vb===undefined||vb==="")vb=sortAsc?Infinity:-Infinity;
    if(typeof va==="string"&&typeof vb==="string")return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
    return sortAsc?Number(va)-Number(vb):Number(vb)-Number(va)});
  return items
}

// --- Desktop Table Render ---
function renderTable(items){
  const cols=TABS[curTab];
  let th="<tr>";
  cols.forEach(([key,label,align])=>{
    const ac=align?` class="${align}"`:""
    const arrow=key===sortKey?(sortAsc?" ▲":" ▼"):"";
    th+=`<th data-key="${key}"${ac}>${label}<span class="arrow">${arrow}</span></th>`});
  document.getElementById("thead").innerHTML=th+"</tr>";
  let html="";
  items.forEach(d=>{
    const cls=d.is_tier1?"tier1":"";
    html+=`<tr class="${cls}">`;
    cols.forEach(([key,label,align,type])=>{
      const ac=align?` class="${align}"`:""
      let val=F(d[key],type);
      if(key==="code"){
        val=`<a class="code-link" href="https://kabutan.jp/stock/?code=${d.code}" target="_blank">${d.code}</a>`;
        if(d.is_tier1)val+=`<span class="t1-tag">T1</span>`;
        if(d.is_new)val+=`<span class="new-tag">NEW</span>`}
      if(key==="name"&&window._reportMap&&window._reportMap[d.code]){
        val=`<a href="${window._reportMap[d.code]}#stock-${d.code}" target="_blank" style="color:var(--text);text-decoration:underline dotted var(--blue)">${esc(d.name)}</a>`}
      html+=`<td${ac}>${val}</td>`});
    html+="</tr>"});
  document.getElementById("tbody").innerHTML=html;
  document.querySelectorAll("#thead th[data-key]").forEach(th=>{
    th.addEventListener("click",()=>{
      const key=th.dataset.key;
      if(sortKey===key)sortAsc=!sortAsc;
      else{sortKey=key;sortAsc=(key==="judge"||key==="code")}
      render()})})
}

// --- Mobile Card Render ---
function renderCards(items){
  const tab=curTab;
  let html="";
  items.forEach(d=>{
    const t1=d.is_tier1?` tier1`:"";
    const badge=d.judge==="☆"?`<span class="badge badge-star">☆</span>`:
      d.judge==="◎"?`<span class="badge badge-double">◎</span>`:
      d.judge==="○"?`<span class="badge badge-single">○</span>`:"";
    const t1tag=d.is_tier1?`<span class="t1-tag">T1</span>`:"";
    const newtag=d.is_new?`<span class="new-tag">NEW</span>`:"";

    html+=`<div class="card${t1}" data-code="${d.code}">`;
    // Header: always code + name + badge
    html+=`<div class="card-head">`;
    html+=`<a class="card-code" href="https://kabutan.jp/stock/?code=${d.code}" target="_blank">${d.code}</a>${t1tag}${newtag}`;
    const nameHtml=window._reportMap&&window._reportMap[d.code]
      ?`<a href="${window._reportMap[d.code]}#stock-${d.code}" target="_blank" style="color:var(--text);text-decoration:underline dotted var(--blue)">${esc(d.name)}</a>`
      :esc(d.name);
    html+=`<span class="card-name">${nameHtml}</span>${badge}</div>`;

    if(tab==="price"){
      const chgCls=d.change_pct>=0?"up":"down";
      const chgStr=d.change_pct!==null?((d.change_pct>=0?"+":"")+d.change_pct.toFixed(2)+"%"):"-";
      html+=`<div class="card-row">`;
      html+=`<span class="card-price">&yen;${d.price!==null?Number(d.price).toLocaleString():"-"}</span>`;
      html+=`<span class="card-change ${chgCls}">${chgStr}</span>`;
      html+=`</div>`;
      if(d.memo)html+=`<div class="card-memo open">${esc(d.memo)}</div>`;
    }
    else if(tab==="earnings"){
      html+=`<div class="card-detail-grid">`;
      html+=`<span class="lbl">売上</span><span class="val">${F(d.sales_now,"mil")} / ${F(d.sales_prev,"mil")} (${F(d.sales_yoy,"chg")})</span>`;
      html+=`<span class="lbl">営利</span><span class="val">${F(d.op_now,"mil")} / ${F(d.op_prev,"mil")} (${F(d.op_yoy,"chg")})</span>`;
      html+=`<span class="lbl">営利率</span><span class="val">${F(d.op_margin,"pct")}</span>`;
      html+=`<span class="lbl">決算</span><span class="val">${d.earnings_type||"-"}  増益${d.consecutive!==null?d.consecutive:"-"}期</span>`;
      html+=`</div>`;
    }
    else if(tab==="value"){
      html+=`<div class="card-sub">`;
      html+=`<span class="card-tag">時価総額 <span class="val">${F(d.market_cap,"oku")}</span></span>`;
      html+=`<span class="card-tag">PER <span class="val">${F(d.per,"f1")}</span></span>`;
      html+=`<span class="card-tag">CNPER <span class="val">${F(d.cnper,"f1")}</span></span>`;
      html+=`<span class="card-tag">NC比率 <span class="val">${F(d.nc_ratio,"pct")}</span></span>`;
      html+=`</div>`;
      html+=`<div class="card-detail-grid" style="margin-top:6px">`;
      html+=`<span class="lbl">純利(直)</span><span class="val">${F(d.np0,"mil")}</span>`;
      html+=`<span class="lbl">純利(1期前)</span><span class="val">${F(d.np1,"mil")}</span>`;
      html+=`<span class="lbl">純利(2期前)</span><span class="val">${F(d.np2,"mil")}</span>`;
      html+=`</div>`;
      if(d.business)html+=`<div class="card-memo open" style="margin-top:6px">${esc(d.business)}</div>`;
    }
    else if(tab==="nc"){
      html+=`<div class="card-detail-grid">`;
      html+=`<span class="lbl">NC</span><span class="val">${F(d.nc0,"mil")} → ${F(d.nc1,"mil")} → ${F(d.nc2,"mil")}</span>`;
      html+=`<span class="lbl">流動資産</span><span class="val">${F(d.ca0,"mil")} → ${F(d.ca1,"mil")} → ${F(d.ca2,"mil")}</span>`;
      html+=`<span class="lbl">有証</span><span class="val">${F(d.inv0,"mil")} → ${F(d.inv1,"mil")} → ${F(d.inv2,"mil")}</span>`;
      html+=`<span class="lbl">負債</span><span class="val">${F(d.debt0,"mil")} → ${F(d.debt1,"mil")} → ${F(d.debt2,"mil")}</span>`;
      html+=`</div>`;
    }
    html+=`</div>`});
  document.getElementById("cards").innerHTML=html;
}

// --- Sort bar (mobile) ---
function renderSortBar(){
  const opts=SORT_OPTS[curTab]||[];
  let html="";
  opts.forEach(([key,label])=>{
    const act=key===sortKey?"active":"";
    const arrow=key===sortKey?(sortAsc?"▲":"▼"):"";
    html+=`<span class="sort-btn ${act}" data-sort="${key}">${label}${arrow}</span>`});
  const bar=document.getElementById("sortBar");
  bar.innerHTML=html;
  bar.querySelectorAll(".sort-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const key=btn.dataset.sort;
      if(sortKey===key)sortAsc=!sortAsc;
      else{sortKey=key;sortAsc=(key==="judge"||key==="code")}
      render()})})
}

// --- Main render ---
function render(){
  const items=getFiltered();
  if(isMobile()){
    renderCards(items);
    renderSortBar();
  }else{
    renderTable(items);
  }
  document.getElementById("count").textContent=`${items.length} / ${DATA.length}銘柄`;
}

// Tab switching
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    curTab=t.dataset.tab;
    sortKey="judge";sortAsc=true;
    render();
    document.querySelector(".scroll-area").scrollTop=0})
});

document.getElementById("search").addEventListener("input",render);
document.getElementById("tier1Only").addEventListener("change",render);
document.getElementById("judgeOnly").addEventListener("change",render);
window.addEventListener("resize",render);

// Load report map (code -> report URL)
fetch("reports.json").then(r=>r.json()).then(data=>{
  window._reportMap={};
  const reports=data.reports||[];
  reports.forEach(rpt=>{
    (rpt.codes||[]).forEach(code=>{
      if(!window._reportMap[code])window._reportMap[code]=rpt.url;
    });
  });
  if(reports.length>0){
    const btn=document.getElementById("reportBtn");
    btn.href=reports[0].url;
    btn.style.display="inline-block";
    btn.textContent="Grokレポート ("+reports[0].date+")";
  }
  render();
}).catch(()=>{});

render();
</script>
