<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>投資ディベート一覧</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#c9d1d9;
  --muted:#8b949e;--blue:#58a6ff;--red:#f85149;--green:#3fb950}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans",sans-serif;
  background:var(--bg);color:var(--text);max-width:800px;margin:0 auto;padding:16px;font-size:14px}
h1{color:var(--blue);font-size:18px;margin-bottom:8px}
h2{font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);
  padding-bottom:4px;margin:20px 0 10px;text-transform:uppercase;letter-spacing:.5px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.top{display:flex;align-items:center;gap:12px;margin-bottom:4px;flex-wrap:wrap}
.back{font-size:13px}
.refresh{background:var(--bg3);border:1px solid var(--border);color:var(--text);
  padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px;-webkit-tap-highlight-color:transparent}
.refresh:active{background:var(--border)}
ul{list-style:none}
li{margin:6px 0;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);
  border-radius:6px}
li a.title{display:block;font-size:14px;font-weight:600}
.meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.meta a{font-size:11px}
.status{font-size:11px;color:var(--muted);padding:8px 0}
.err{color:var(--red)}
.ok{color:var(--green)}
.empty{color:var(--muted);font-style:italic;padding:8px 12px}
</style>
</head>
<body>
<h1>投資ディベート一覧</h1>
<div class="top">
  <a class="back" href="index.html">&larr; ウォッチリスト</a>
  <button class="refresh" onclick="loadDrive(true)">Drive更新</button>
</div>

<h2>Google Drive</h2>
<div id="driveStatus" class="status">読み込み中...</div>
<ul id="driveList"></ul>

<h2>ローカル PDF (リポジトリ内)</h2>
<ul id="localList"></ul>

<script>
// リポジトリ内の既存PDF（移行中の互換のため残置）
const LOCAL_PDFS = [
  {name:"オータス_投資分析",url:"debates/otasu.pdf"},
  {name:"グローバルLM_投資分析",url:"debates/global_lm.pdf"},
  {name:"コロンビアワークス_投資分析",url:"debates/columbia_works.pdf"},
  {name:"フリージアマクロス_投資分析",url:"debates/freesia_macros.pdf"},
  {name:"多摩川HD_財務分析",url:"debates/tamagawa_hd.pdf"},
  {name:"川崎地質_投資分析",url:"debates/kawasaki_geological.pdf"},
  {name:"平河ヒューテック_投資分析",url:"debates/hirakawa_hewtech.pdf"},
  {name:"日本農薬_投資分析",url:"debates/nihon_nohyaku.pdf"},
  {name:"林兼産業_投資分析",url:"debates/hayashikane.pdf"},
  {name:"霞ヶ関キャピタル_投資分析",url:"debates/kasumigaseki_capital.pdf"}
];

const CACHE_KEY = "driveDebatesCache_v1";
const CACHE_TTL = 5*60*1000; // 5分

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function renderLocal(){
  document.getElementById("localList").innerHTML = LOCAL_PDFS.map(f=>
    `<li><a class="title" href="${escapeHtml(f.url)}" target="_blank" rel="noopener">${escapeHtml(f.name)}</a></li>`
  ).join("");
}

function renderDrive(files){
  const list = document.getElementById("driveList");
  if(!files || files.length===0){
    list.innerHTML = '<li class="empty">ファイルなし</li>';
    return;
  }
  // 更新日時降順
  files = files.slice().sort((a,b)=> (b.modifiedTime||"").localeCompare(a.modifiedTime||""));
  list.innerHTML = files.map(f=>{
    const id = encodeURIComponent(f.id);
    const viewUrl = `https://drive.google.com/file/d/${id}/view`;
    const previewUrl = `https://drive.google.com/file/d/${id}/preview`;
    const mt = f.modifiedTime ? f.modifiedTime.slice(0,10) : "";
    const name = escapeHtml(f.name||"(無題)");
    return `<li>
      <a class="title" href="${viewUrl}" target="_blank" rel="noopener">${name}</a>
      <div class="meta">
        <span>${mt}</span>
        <a href="${previewUrl}" target="_blank" rel="noopener">プレビュー</a>
      </div>
    </li>`;
  }).join("");
}

function showCacheIfAny(label){
  try{
    const cached = JSON.parse(localStorage.getItem(CACHE_KEY)||"null");
    if(cached && cached.files){
      renderDrive(cached.files);
      const age = Math.round((Date.now()-cached.ts)/60000);
      const el = document.getElementById("driveStatus");
      el.innerHTML = `${cached.files.length} 件 <span class="${label==='err'?'err':'ok'}">(${label==='err'?'取得失敗、キャッシュ表示':'キャッシュ'}: ${age}分前)</span>`;
      return true;
    }
  }catch(e){}
  return false;
}

async function loadDrive(forceRefresh){
  const statusEl = document.getElementById("driveStatus");

  // 強制更新でなければキャッシュ優先
  if(!forceRefresh){
    try{
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY)||"null");
      if(cached && cached.files && (Date.now()-cached.ts) < CACHE_TTL){
        renderDrive(cached.files);
        statusEl.innerHTML = `${cached.files.length} 件 <span class="ok">(キャッシュ)</span>`;
        return;
      }
    }catch(e){}
  }

  // config取得
  let cfg;
  try{
    const r = await fetch("drive-config.json",{cache:"no-store"});
    if(!r.ok) throw new Error("drive-config.json が見つかりません");
    cfg = await r.json();
  }catch(e){
    statusEl.innerHTML = `<span class="err">${escapeHtml(e.message)}</span>`;
    showCacheIfAny("err");
    return;
  }

  if(!cfg.apiKey || !cfg.folderId ||
     cfg.apiKey.startsWith("REPLACE_") || cfg.folderId.startsWith("REPLACE_")){
    statusEl.innerHTML = '<span class="err">drive-config.json に apiKey / folderId を設定してください</span>';
    showCacheIfAny("err");
    return;
  }

  // Drive API v3: files.list
  const params = new URLSearchParams({
    q: `'${cfg.folderId}' in parents and trashed=false`,
    key: cfg.apiKey,
    fields: "files(id,name,mimeType,modifiedTime,size)",
    orderBy: "modifiedTime desc",
    pageSize: "200"
  });
  const url = `https://www.googleapis.com/drive/v3/files?${params}`;

  try{
    statusEl.textContent = "読み込み中...";
    const r = await fetch(url);
    if(!r.ok){
      const text = await r.text();
      throw new Error(`HTTP ${r.status}: ${text.slice(0,300)}`);
    }
    const data = await r.json();
    const files = data.files || [];
    try{
      localStorage.setItem(CACHE_KEY, JSON.stringify({ts:Date.now(), files}));
    }catch(e){}
    renderDrive(files);
    statusEl.innerHTML = `${files.length} 件 <span class="ok">(最新)</span>`;
  }catch(e){
    statusEl.innerHTML = `<span class="err">Drive API 読み込み失敗: ${escapeHtml(e.message)}</span>`;
    showCacheIfAny("err");
  }
}

renderLocal();
loadDrive(false);
</script>
</body>
</html>
